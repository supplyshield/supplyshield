<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboard New Package</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='actionables-dashboard.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='repositories-listing.css') }}">
</head>

<body>
    {% include 'includes/navbar.html' %}

    <div class="page-header">
        <div class="container-fluid px-4">
            <h1 class="page-title">Onboard New Package</h1>
            <p class="page-subtitle">Manually add packages to the Actionable list and fetch their versions</p>
        </div>
    </div>

    <div class="container-fluid px-4">
        {% if message %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endif %}

        <div class="card shadow-sm" style="max-width: 800px;">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-4">
                        <label for="package_url" class="form-label fw-bold">Package URL (PURL)</label>
                        <input type="text" class="form-control form-control-lg" id="package_url" name="package_url"
                            placeholder="pkg:maven/org.apache.logging.log4j/log4j-core" required>
                        <div class="form-text">Enter the Package URL (PURL). Versions will be fetched automatically from PURLDB.</div>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        Onboard Package
                    </button>
                    <a href="{{ url_for('package.packages_index') }}" class="btn btn-outline-secondary ms-2">Cancel</a>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>
</body>

</html>
