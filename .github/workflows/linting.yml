name: Linting checks

on:
  pull_request:
    branches:
      - '**'  

jobs:
  make-check:
    runs-on: [self-hosted, linux, X64, codeql]

    steps:    
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Cache pip downloads
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'setup.cfg', 'pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential

    - name: Install dependencies
      run: |
        make virtualenv
        python -m pip install --upgrade pip
        pip install ruff black isort

    - name: Run Make Check
      run: make check

    - name: Install lint/security tools
      run: |
        pip install mypy bandit pip-audit

    - name: Run mypy
      run: |
        python -m mypy --config-file pyproject.toml
      continue-on-error: false

    # Sprint 54.4 — bandit is a required gate. The baseline file
    # `.bandit_baseline.json` records the current accepted findings; CI fails
    # only on NEW findings beyond that baseline. To accept a new finding,
    # regenerate the baseline locally (`bandit -r libinv -f json -o
    # .bandit_baseline.json`) and justify the addition in the PR.
    - name: Run bandit
      run: |
        python -m bandit -r libinv/ --baseline .bandit_baseline.json
      continue-on-error: false

    - name: Run pip-audit
      run: |
        pip install -r requirements.txt
        python -m pip_audit -r requirements.txt
      continue-on-error: true
