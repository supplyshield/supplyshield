[tool.black]
line-length = 100
include = '\.pyi?$'
#skip_gitignore = true
# 'extend-exclude' excludes files or directories in addition to the defaults
extend-exclude = '''
(
   ^/venv/.*
   | ^/alembic/.*
)
'''

[tool.isort]
profile = "black"
line_length = 100
force_single_line = true
skip = ["venv", "scans", "alembic"]

[tool.ruff]
line-length = 100
exclude = [
    "alembic/*"
]

[tool.ruff.lint.isort]
force-single-line = true

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]

[tool.uv.sources]
libinv = { workspace = true }

[dependency-groups]
dev = [
    "libinv",
]
