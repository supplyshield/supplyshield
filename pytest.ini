[pytest]
# Note: `tests/integration` lives under `tests/` and is reached via recursion.
# We deliberately do NOT list it separately in `testpaths` because pytest's
# de-duplication of overlapping roots silently drops the `tests/` collection
# when both are present. The integration suite's conftest uses
# `collect_ignore_glob` to skip its tests cleanly when TEST_DATABASE_URL is
# unset, so the default `make tests` run stays green.
testpaths = tests libinv
addopts =
    -ra
    --strict-markers
    --strict-config
    --doctest-modules
    --ignore-glob=*scio_models.py
    --ignore-glob=*scancodeio.py
    --ignore=alembic
filterwarnings =
    ignore::DeprecationWarning:sqlalchemy.*
